# 本地开发环境 — 仅启动依赖服务（MySQL + Redis）
# Go 应用在宿主机通过 air 运行，代码修改即时生效。
#
# 启动方式:
#   docker compose -f docker-compose.dev.yml up -d
#   air
#
# 生产环境使用 docker-compose.yml（包含应用构建）。

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-server
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-app}
      MYSQL_DATABASE: ${DB_DATABASE:-expiry_db}
      TZ: UTC
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init.sql:/docker-entrypoint-initdb.d/01-prisma-migrate.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
